name: standard
description: "Standard workflow: setup, implement, review, simplify, verify, create PR, review cycle, merge, cleanup"
tags: [standard, agent]

phases:
  - id: setup
    type: script
    command: setup-worktree.sh
    args:
      - "{{ repo }}"
      - "{{ branch }}"
      - "{{ worktree }}"
    capture:
      worktree: stdout
    onSuccess: implement
    onFailure: abort

  - id: implement
    type: agent
    promptTemplate: implement.md
    maxRetries: 1
    onSuccess: self_review
    onFailure: escalate

  - id: self_review
    type: agent
    promptTemplate: self-review.md
    allowedTools:
      - Read
      - Glob
      - Grep
      - Bash
    maxTurns: 15
    onSuccess: simplify
    onFailure: implement

  - id: simplify
    type: agent
    promptTemplate: simplify.md
    maxTurns: 20
    onSuccess: verify
    onFailure: verify

  - id: verify
    type: agent
    promptTemplate: verify.md
    maxTurns: 15
    maxRetries: 1
    onSuccess: create_pr
    onFailure: implement

  - id: create_pr
    type: agent
    promptTemplate: create-pr.md
    maxTurns: 10
    capture:
      pr_url: "gh pr view --json url --jq .url"
      pr_number: "gh pr view --json number --jq .number"
    onSuccess: await_review
    onFailure: escalate

  - id: await_review
    type: poll
    command: check-pr-review.sh
    args:
      - "{{ repo }}"
      - "{{ context.pr_number }}"
    intervalSeconds: 60
    timeoutSeconds: 86400
    onSuccess: await_merge
    onFailure: handle_review

  - id: handle_review
    type: agent
    promptTemplate: handle-review.md
    maxTurns: 20
    onSuccess: verify_post_review
    onFailure: escalate

  - id: verify_post_review
    type: agent
    promptTemplate: verify.md
    maxTurns: 15
    onSuccess: push_fixes
    onFailure: handle_review

  - id: push_fixes
    type: agent
    promptTemplate: push-fixes.md
    maxTurns: 5
    onSuccess: await_review
    onFailure: escalate

  - id: await_merge
    type: poll
    command: check-pr-merged.sh
    args:
      - "{{ repo }}"
      - "{{ context.pr_number }}"
    intervalSeconds: 60
    timeoutSeconds: 86400
    onSuccess: cleanup
    onFailure: escalate

  - id: cleanup
    type: script
    command: cleanup-worktree.sh
    args:
      - "{{ worktree }}"
    onSuccess: complete
    onFailure: complete

  - id: complete
    type: terminal

  - id: escalate
    type: terminal
    notify: true

  - id: abort
    type: terminal
    notify: true
