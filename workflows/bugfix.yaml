name: bugfix
description: "Bugfix workflow: setup, implement fix, verify, create PR, review cycle, merge, cleanup"
tags: [bugfix, agent]

phases:
  - id: setup
    type: script
    command: setup.sh
    args:
      - "{{ repo }}"
      - "{{ branch }}"
      - "{{ worktree }}"
    capture:
      worktree: stdout
    onSuccess: implement
    onFailure: abort

  - id: implement
    type: agent
    promptTemplate: implement-bugfix.md
    maxTurns: 30
    maxRetries: 1
    onSuccess: verify
    onFailure: escalate

  - id: verify
    type: agent
    promptTemplate: verify.md
    maxTurns: 15
    maxRetries: 1
    onSuccess: create_pr
    onFailure: implement

  - id: create_pr
    type: agent
    promptTemplate: create-pr.md
    maxTurns: 10
    capture:
      pr_url: "gh pr view --json url --jq .url"
      pr_number: "gh pr view --json number --jq .number"
    onSuccess: await_review
    onFailure: escalate

  - id: await_review
    type: poll
    command: check-pr-review.sh
    args:
      - "{{ repo }}"
      - "{{ context.pr_number }}"
    intervalSeconds: 60
    timeoutSeconds: 86400
    capture:
      review_state: stdout
    onSuccess: route_review
    onFailure: route_review_failure

  - id: route_review_failure
    type: script
    command: check-pr-closed.sh
    args:
      - "{{ repo }}"
      - "{{ context.pr_number }}"
    onSuccess: pr_closed
    onFailure: escalate

  - id: route_review
    type: script
    command: route-review.sh
    args:
      - "{{ context.review_state }}"
    onSuccess: await_merge
    onFailure: handle_review

  - id: handle_review
    type: agent
    promptTemplate: handle-review.md
    maxTurns: 20
    onSuccess: await_review
    onFailure: escalate

  - id: await_merge
    type: poll
    command: check-pr-merged.sh
    args:
      - "{{ repo }}"
      - "{{ context.pr_number }}"
    intervalSeconds: 60
    timeoutSeconds: 86400
    onSuccess: cleanup
    onFailure: route_merge_failure

  - id: route_merge_failure
    type: script
    command: check-pr-closed.sh
    args:
      - "{{ repo }}"
      - "{{ context.pr_number }}"
    onSuccess: pr_closed
    onFailure: escalate

  - id: cleanup
    type: script
    command: cleanup.sh
    args:
      - "{{ worktree }}"
    onSuccess: complete
    onFailure: complete

  - id: complete
    type: terminal

  - id: pr_closed
    type: terminal
    notify: true

  - id: escalate
    type: terminal
    notify: true

  - id: abort
    type: terminal
    notify: true
